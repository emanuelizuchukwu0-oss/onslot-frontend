<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OnSlot - Buy Cheap Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Your existing styles here - keeping them as they are */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #ffffff; overflow-x: hidden; }
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: float 20s ease-in-out infinite; }
        .orb-1 { width: 500px; height: 500px; background: #f59e0b; top: -200px; left: -200px; }
        .orb-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -150px; right: -150px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: #10b981; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; opacity: 0.15; }
        @keyframes float { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-30px) scale(1.1); } 66% { transform: translate(-20px,20px) scale(0.9); } }
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(15,25,35,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 100; padding: 16px 24px; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #f59e0b, #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo span { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #fff, #f59e0b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-info { display: flex; align-items: center; gap: 15px; position: relative; }
        .user-name { color: #f59e0b; font-weight: 500; }
        .wallet-balance { background: rgba(16,185,129,0.2); padding: 5px 12px; border-radius: 30px; font-size: 0.8rem; border: 1px solid rgba(16,185,129,0.3); }
        .admin-flag { background: rgba(30,41,59,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 40px; color: #f59e0b; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; position: relative; }
        .admin-flag:hover { background: rgba(30,41,59,0.6); }
        .notification-badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 50px; min-width: 20px; text-align: center; }
        .logout-btn { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3); padding: 8px 16px; border-radius: 40px; color: #ef4444; cursor: pointer; }
        .logout-btn:hover { background: #ef4444; color: white; }
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; max-width: 800px; margin: 0 auto; padding: 120px 24px 60px; position: relative; z-index: 1; }
        .container { max-width: 1200px; margin: 0 auto; padding: 60px 24px; position: relative; z-index: 1; }
        .auth-form { max-width: 400px; margin: 0 auto; }
        .input-group { display: flex; align-items: center; background: rgba(30,41,59,0.6); border-radius: 60px; padding: 4px 20px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
        .input-group:focus-within { border-color: #f59e0b; }
        .input-group i { color: #94a3b8; font-size: 18px; }
        .input-group input { width: 100%; padding: 18px 16px; background: transparent; border: none; color: white; font-size: 1rem; outline: none; }
        .buy-btn { width: 100%; background: linear-gradient(135deg, #f59e0b, #d97706); border: none; padding: 18px; border-radius: 60px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .buy-btn:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(245,158,11,0.3); }
        .auth-switch { margin-top: 20px; color: #94a3b8; }
        .auth-switch a { color: #f59e0b; text-decoration: none; cursor: pointer; }
        .dashboard-content { display: none; }
        .fund-section, .data-section, .referral-section, .admin-panel { background: rgba(15,25,35,0.6); backdrop-filter: blur(12px); border-radius: 28px; padding: 24px; margin-bottom: 30px; border: 1px solid rgba(245,158,11,0.2); }
        .section-title { font-size: 1.3rem; margin-bottom: 20px; color: #f59e0b; display: flex; align-items: center; gap: 10px; }
        .fund-main-btn { width: 100%; background: linear-gradient(135deg, #f59e0b, #d97706); border: none; padding: 18px; border-radius: 60px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .network-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .network-btn { flex: 1; background: rgba(30,41,59,0.6); border: 2px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .network-btn.selected { border-color: #f59e0b; background: rgba(245,158,11,0.15); }
        .plans-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 20px; }
        .plan-card { background: rgba(30,41,59,0.6); border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.08); }
        .plan-card.selected { border: 2px solid #f59e0b; }
        .plan-price { color: #f59e0b; font-weight: bold; margin-top: 5px; }
        .confirm-input { width: 100%; padding: 14px; background: rgba(30,41,59,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: white; margin: 15px 0; outline: none; }
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; flex-wrap: wrap; }
        .admin-tab { padding: 8px 20px; border-radius: 30px; cursor: pointer; background: rgba(30,41,59,0.4); }
        .admin-tab.active { background: #f59e0b; color: #0a0a0a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .pending-item { background: rgba(30,41,59,0.6); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; }
        .success-btn { background: linear-gradient(135deg, #10b981, #059669); border: none; padding: 8px 16px; border-radius: 40px; color: white; cursor: pointer; }
        .decline-btn { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3); padding: 8px 16px; border-radius: 40px; color: #ef4444; cursor: pointer; }
        .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1100; }
        .toast { background: rgba(15,25,35,0.95); backdrop-filter: blur(12px); padding: 12px 24px; border-radius: 50px; font-size: 0.875rem; display: flex; align-items: center; gap: 8px; animation: slideUp 0.3s ease; }
        .toast.success { border-left: 3px solid #10b981; }
        .toast.error { border-left: 3px solid #ef4444; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @media (max-width: 768px) { .plans-grid { grid-template-columns: repeat(2, 1fr); } .pending-item { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="bg-animation"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><div class="logo-icon"><i class="fas fa-bolt"></i></div><span>OnSlot</span></div>
            <div class="user-info" id="userInfo" style="display: none;">
                <span class="user-name" id="userNameDisplay"></span>
                <span class="wallet-balance" id="walletBalance">₦0</span>
                <div id="adminButtonContainer" style="display: none;">
                    <button class="admin-flag" id="adminFlagBtn">
                        <i class="fas fa-flag-checkered"></i> Admin
                        <span id="adminNotificationBadge" class="notification-badge" style="display: none;">0</span>
                    </button>
                </div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <!-- Auth Section -->
    <div id="authSection" class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Buy Cheap Data<br><span class="gradient-text">All Networks</span></h1>
            <div id="loginForm" class="auth-form">
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email address"></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Password"></div>
                <button class="buy-btn" onclick="login()">Login <i class="fas fa-arrow-right"></i></button>
                <div class="auth-switch">Don't have an account? <a onclick="showSignup()">Sign up</a></div>
            </div>
            <div id="signupForm" class="auth-form" style="display: none;">
                <div class="input-group"><i class="fas fa-user"></i><input type="text" id="signupName" placeholder="Full name"></div>
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="signupEmail" placeholder="Email address"></div>
                <div class="input-group"><i class="fas fa-phone"></i><input type="tel" id="signupPhone" placeholder="Phone number"></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="signupPassword" placeholder="Password (min 4 characters)"></div>
                <div class="input-group"><i class="fas fa-gift"></i><input type="text" id="referralCodeInput" placeholder="Referral code (optional)"></div>
                <button class="buy-btn" onclick="signup()">Create Account <i class="fas fa-user-plus"></i></button>
                <div class="auth-switch">Already have an account? <a onclick="showLogin()">Login</a></div>
            </div>
        </div>
    </div>

    <!-- Dashboard Content -->
    <div id="dashboardContent" class="dashboard-content">
        <div class="container">
            <!-- Fund Wallet Section -->
            <div class="fund-section">
                <div class="section-title"><i class="fas fa-wallet"></i> Fund Your Wallet</div>
                <button class="fund-main-btn" id="fundMainBtn"><i class="fas fa-plus-circle"></i> Fund Wallet</button>
                <div id="amountSection" style="display: none;">
                    <div class="charge-note" style="background: rgba(245,158,11,0.1); padding: 10px; border-radius: 12px; margin-bottom: 15px;">
                        <i class="fas fa-info-circle"></i> ₦50 service charge applies to all transactions
                    </div>
                    <div class="amount-buttons" style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px;">
                        <button class="amount-btn" data-amount="400">₦400</button>
                        <button class="amount-btn" data-amount="500">₦500</button>
                        <button class="amount-btn" data-amount="1000">₦1,000</button>
                        <button class="amount-btn" data-amount="2000">₦2,000</button>
                        <button class="amount-btn" data-amount="5000">₦5,000</button>
                    </div>
                    <div class="custom-amount-container" style="margin-bottom: 15px;">
                        <input type="number" id="customAmount" placeholder="Enter custom amount (₦400 minimum)" style="width: 100%; padding: 12px; background: rgba(30,41,59,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: white;">
                    </div>
                    <div class="payment-methods" style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
                        <button class="payment-method" data-method="bank_transfer" style="flex: 1; padding: 12px; background: rgba(30,41,59,0.6); border-radius: 12px; cursor: pointer;">Bank Transfer</button>
                        <button class="payment-method" data-method="ussd" style="flex: 1; padding: 12px; background: rgba(30,41,59,0.6); border-radius: 12px; cursor: pointer;">USSD</button>
                        <button class="payment-method" data-method="pos" style="flex: 1; padding: 12px; background: rgba(30,41,59,0.6); border-radius: 12px; cursor: pointer;">POS</button>
                    </div>
                    <input type="text" id="fundingTransactionRef" class="confirm-input" placeholder="Transaction reference / Receipt code">
                    <button class="buy-btn" onclick="submitFundingConfirm()">Submit Funding Request</button>
                </div>
            </div>

            <!-- Buy Data Section -->
            <div class="data-section">
                <div class="section-title"><i class="fas fa-database"></i> Buy Data</div>
                <div class="network-buttons">
                    <button class="network-btn" onclick="selectNetwork('mtn')">MTN</button>
                    <button class="network-btn" onclick="selectNetwork('airtel')">Airtel</button>
                    <button class="network-btn" onclick="selectNetwork('glo')">Glo</button>
                    <button class="network-btn" onclick="selectNetwork('9mobile')">9mobile</button>
                </div>
                <div id="plansContainer" class="plans-grid"></div>
                <input type="tel" id="purchasePhone" class="confirm-input" placeholder="Enter phone number to receive data" maxlength="11">
                <button class="buy-btn" id="buyDataBtn" onclick="submitPurchase()" disabled>Buy Data</button>
            </div>

            <!-- Referral Section -->
            <div class="referral-section">
                <div class="section-title"><i class="fas fa-users"></i> Refer & Earn</div>
                <div class="referral-code-box" style="background: rgba(30,41,59,0.8); border-radius: 16px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <span class="referral-code" id="userReferralCode" style="font-size: 1.3rem; font-weight: bold; color: #f59e0b;">Loading...</span>
                    <button class="copy-referral-btn" onclick="copyReferralCode()" style="background: rgba(245,158,11,0.2); border: none; padding: 8px 20px; border-radius: 40px; color: #f59e0b; cursor: pointer;">Copy Code</button>
                </div>
                <div class="referral-stats" style="display: flex; justify-content: space-between; padding-top: 15px;">
                    <div><div>Referrals Made</div><div id="referralCount" style="font-size: 1.5rem; font-weight: bold; color: #f59e0b;">0</div></div>
                    <div><div>Next Reward</div><div id="referralsNeeded">5 referrals = 500MB</div></div>
                </div>
            </div>

            <!-- Admin Panel -->
            <div id="adminPanelContainer" style="display: none;">
                <div class="admin-panel">
                    <div class="admin-tabs">
                        <div class="admin-tab active" data-tab="funding">💰 Funding (<span id="fundingTabCount">0</span>)</div>
                        <div class="admin-tab" data-tab="purchases">📱 Purchases (<span id="purchaseTabCount">0</span>)</div>
                        <div class="admin-tab" data-tab="referrals">🎁 Referrals (<span id="referralTabCount">0</span>)</div>
                    </div>
                    <div id="fundingTab" class="tab-content active"><div id="fundingList"></div></div>
                    <div id="purchasesTab" class="tab-content"><div id="purchasesList"></div></div>
                    <div id="referralsTab" class="tab-content"><div id="referralsList"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_URL = 'https://onslot.onrender.com/api'; // Change to your backend URL
        const SERVICE_CHARGE = 50;
        let currentUser = null;
        let selectedAmount = null;
        let selectedFundingMethod = "bank_transfer";
        let selectedNetwork = null;
        let selectedPlan = null;
        let dataPlans = [];

        // Check if user is admin (email ends with %%)
        function isAdminUser(email) {
            return email && email.endsWith('%%');
        }

        // Show toast notification
        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // API call function
        async function callAPI(endpoint, method = 'GET', body = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            try {
                const response = await fetch(`${API_URL}${endpoint}`, options);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                showToast('Network error. Please check your connection.', 'error');
                return null;
            }
        }

        // Signup function
        async function signup() {
            const name = document.getElementById("signupName").value.trim();
            const email = document.getElementById("signupEmail").value.trim().toLowerCase();
            const phone = document.getElementById("signupPhone").value.trim();
            const password = document.getElementById("signupPassword").value;
            const referralCode = document.getElementById("referralCodeInput").value.trim();

            if (!name || !email || !phone || !password) {
                showToast("Please fill all fields", "error");
                return;
            }

            if (password.length < 4) {
                showToast("Password must be at least 4 characters", "error");
                return;
            }

            const result = await callAPI('/signup', 'POST', { name, email, phone, password, referralCode });
            
            if (result && result.success) {
                showToast("Account created successfully! Please login.", "success");
                showLogin();
                document.getElementById("signupName").value = "";
                document.getElementById("signupEmail").value = "";
                document.getElementById("signupPhone").value = "";
                document.getElementById("signupPassword").value = "";
                document.getElementById("referralCodeInput").value = "";
            } else {
                showToast(result?.error || "Signup failed", "error");
            }
        }

        // Login function
        async function login() {
            const email = document.getElementById("loginEmail").value.trim().toLowerCase();
            const password = document.getElementById("loginPassword").value;

            if (!email || !password) {
                showToast("Please enter email and password", "error");
                return;
            }

            const result = await callAPI('/login', 'POST', { email, password });
            
            if (result && result.success) {
                currentUser = result.user;
                sessionStorage.setItem('userEmail', currentUser.email);
                showToast("Login successful!", "success");
                await loadDashboard();
            } else {
                showToast(result?.error || "Invalid email or password", "error");
            }
        }

        // Logout function
        function logout() {
            currentUser = null;
            sessionStorage.removeItem('userEmail');
            document.getElementById("authSection").style.display = "flex";
            document.getElementById("dashboardContent").style.display = "none";
            document.getElementById("userInfo").style.display = "none";
            document.getElementById("adminButtonContainer").style.display = "none";
            document.getElementById("adminPanelContainer").style.display = "none";
            showLogin();
            showToast("Logged out successfully", "success");
        }

        function showLogin() {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("signupForm").style.display = "none";
        }

        function showSignup() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "block";
        }

        // Load dashboard after login
        async function loadDashboard() {
            const savedEmail = sessionStorage.getItem('userEmail');
            if (savedEmail) {
                const userData = await callAPI(`/user/${encodeURIComponent(savedEmail)}`);
                if (userData && userData.email) {
                    currentUser = userData;
                    document.getElementById("authSection").style.display = "none";
                    document.getElementById("dashboardContent").style.display = "block";
                    document.getElementById("userInfo").style.display = "flex";
                    document.getElementById("userNameDisplay").innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.name}`;
                    document.getElementById("walletBalance").innerHTML = `₦${currentUser.wallet_balance || 0}`;
                    document.getElementById("userReferralCode").textContent = currentUser.referral_code;
                    document.getElementById("referralCount").textContent = currentUser.referral_count || 0;
                    
                    const referralsLeft = 5 - (currentUser.referral_count || 0);
                    document.getElementById("referralsNeeded").innerHTML = `${referralsLeft} referrals left = 500MB`;
                    
                    // Show admin button ONLY for emails ending with %%
                    const isAdmin = isAdminUser(currentUser.email);
                    const adminButtonContainer = document.getElementById("adminButtonContainer");
                    const adminPanelContainer = document.getElementById("adminPanelContainer");
                    
                    if (isAdmin) {
                        adminButtonContainer.style.display = "block";
                        adminPanelContainer.style.display = "block";
                        document.getElementById("adminFlagBtn").onclick = () => {
                            const panel = document.querySelector(".admin-panel");
                            panel.style.display = panel.style.display === "none" ? "block" : "none";
                        };
                        await loadAdminData();
                        setInterval(loadAdminData, 5000);
                    } else {
                        adminButtonContainer.style.display = "none";
                        adminPanelContainer.style.display = "none";
                    }
                    
                    await loadDataPlans();
                    setupEventListeners();
                }
            }
        }

        // Load data plans
        async function loadDataPlans() {
            const result = await callAPI('/data-plans');
            if (result && Array.isArray(result)) {
                dataPlans = result;
            }
        }

        // Select network
        function selectNetwork(network) {
            selectedNetwork = network;
            document.querySelectorAll(".network-btn").forEach(btn => btn.classList.remove("selected"));
            event.target.classList.add("selected");
            
            const plans = dataPlans.filter(plan => plan.network === network);
            const container = document.getElementById("plansContainer");
            
            if (plans.length === 0) {
                container.innerHTML = '<div class="empty-orders">No plans available</div>';
                return;
            }
            
            container.innerHTML = plans.map(plan => `
                <div class="plan-card" data-plan-id="${plan.id}" data-plan-size="${plan.plan_size}" data-plan-price="${plan.price}">
                    <div class="plan-size">${plan.plan_size}</div>
                    <div class="plan-price">₦${plan.price}</div>
                    <div style="font-size: 0.7rem; color: #94a3b8; margin-top: 5px;">+ ₦${SERVICE_CHARGE} service charge</div>
                </div>
            `).join("");
            
            document.querySelectorAll(".plan-card").forEach(card => {
                card.onclick = () => {
                    document.querySelectorAll(".plan-card").forEach(c => c.classList.remove("selected"));
                    card.classList.add("selected");
                    selectedPlan = {
                        id: card.dataset.planId,
                        size: card.dataset.planSize,
                        price: parseInt(card.dataset.planPrice)
                    };
                    document.getElementById("buyDataBtn").disabled = false;
                    const total = selectedPlan.price + SERVICE_CHARGE;
                    showToast(`Total: ₦${selectedPlan.price} + ₦${SERVICE_CHARGE} = ₦${total}`, "info");
                };
            });
        }

        // Submit purchase
        async function submitPurchase() {
            if (!selectedNetwork) {
                showToast("Select a network", "error");
                return;
            }
            if (!selectedPlan) {
                showToast("Select a data plan", "error");
                return;
            }
            const phone = document.getElementById("purchasePhone").value.trim();
            if (!phone || !/^(0[7-9][0-1]{1}[0-9]{8})$/.test(phone)) {
                showToast("Enter valid phone number (e.g., 08012345678)", "error");
                return;
            }
            
            const totalAmount = selectedPlan.price + SERVICE_CHARGE;
            if ((currentUser.wallet_balance || 0) < totalAmount) {
                showToast(`Insufficient balance. Need ₦${totalAmount}. Please fund your wallet.`, "error");
                return;
            }
            
            const result = await callAPI('/submit-purchase', 'POST', {
                userEmail: currentUser.email,
                userName: currentUser.name,
                userPhone: currentUser.phone,
                network: selectedNetwork,
                planSize: selectedPlan.size,
                planPrice: selectedPlan.price,
                serviceCharge: SERVICE_CHARGE,
                phoneNumber: phone
            });
            
            if (result && result.success) {
                showToast("Purchase request submitted! Processing...", "success");
                currentUser.wallet_balance -= totalAmount;
                document.getElementById("walletBalance").innerHTML = `₦${currentUser.wallet_balance}`;
                document.getElementById("purchasePhone").value = "";
                document.getElementById("buyDataBtn").disabled = true;
                document.querySelectorAll(".plan-card").forEach(c => c.classList.remove("selected"));
                selectedPlan = null;
                
                // Refresh user data
                setTimeout(async () => {
                    const userData = await callAPI(`/user/${encodeURIComponent(currentUser.email)}`);
                    if (userData) {
                        currentUser.wallet_balance = userData.wallet_balance;
                        document.getElementById("walletBalance").innerHTML = `₦${currentUser.wallet_balance}`;
                    }
                }, 2000);
            } else {
                showToast(result?.error || "Purchase failed", "error");
            }
        }

        // Submit funding
        async function submitFundingConfirm() {
            if (!selectedAmount) {
                showToast("Please select an amount", "error");
                return;
            }
            const transactionRef = document.getElementById("fundingTransactionRef").value.trim();
            if (!transactionRef) {
                showToast("Enter transaction reference", "error");
                return;
            }
            
            const result = await callAPI('/submit-funding', 'POST', {
                userEmail: currentUser.email,
                userName: currentUser.name,
                userPhone: currentUser.phone,
                amount: selectedAmount,
                serviceCharge: SERVICE_CHARGE,
                transactionRef: transactionRef,
                paymentMethod: selectedFundingMethod
            });
            
            if (result && result.success) {
                showToast(`Funding request submitted! ₦${selectedAmount + SERVICE_CHARGE} will be added upon approval.`, "success");
                document.getElementById("amountSection").style.display = "none";
                document.getElementById("fundingTransactionRef").value = "";
                selectedAmount = null;
                document.querySelectorAll(".amount-btn").forEach(btn => btn.classList.remove("selected"));
            } else {
                showToast(result?.error || "Failed to submit request", "error");
            }
        }

        // Copy referral code
        function copyReferralCode() {
            const message = `Join OnSlot and buy cheap data! Use my code: ${currentUser.referral_code}\n\nhttps://onslot-frontend.onrender.com`;
            navigator.clipboard.writeText(message);
            showToast("Referral message copied!", "success");
        }

        // Admin functions
        async function loadAdminData() {
            if (!isAdminUser(currentUser?.email)) return;
            
            await Promise.all([
                loadPendingFunding(),
                loadPendingPurchases(),
                loadPendingReferrals()
            ]);
        }

        async function loadPendingFunding() {
            const result = await callAPI('/admin/pending-funding');
            if (result && Array.isArray(result)) {
                const container = document.getElementById("fundingList");
                const pending = result.filter(p => p.status === "pending");
                document.getElementById("fundingTabCount").textContent = pending.length;
                
                if (pending.length === 0) {
                    container.innerHTML = '<div class="empty-orders">No pending funding requests</div>';
                } else {
                    container.innerHTML = pending.map(f => `
                        <div class="pending-item">
                            <div>
                                <p><strong>${f.user_name}</strong> (${f.user_email})</p>
                                <p>Amount: ₦${f.amount} + ₦${f.service_charge} = ₦${f.amount + f.service_charge}</p>
                                <p>Ref: ${f.transaction_ref}</p>
                                <p>Method: ${f.payment_method}</p>
                            </div>
                            <div>
                                <button class="success-btn" onclick="approveFunding(${f.id})">Approve</button>
                                <button class="decline-btn" onclick="declineFunding(${f.id})">Decline</button>
                            </div>
                        </div>
                    `).join("");
                }
            }
        }

        async function loadPendingPurchases() {
            const result = await callAPI('/admin/pending-purchases');
            if (result && Array.isArray(result)) {
                const container = document.getElementById("purchasesList");
                const pending = result.filter(p => p.status === "pending");
                document.getElementById("purchaseTabCount").textContent = pending.length;
                
                if (pending.length === 0) {
                    container.innerHTML = '<div class="empty-orders">No pending purchases</div>';
                } else {
                    container.innerHTML = pending.map(p => `
                        <div class="pending-item">
                            <div>
                                <p><strong>${p.user_name}</strong> (${p.user_email})</p>
                                <p>${p.network.toUpperCase()} - ${p.plan_size}</p>
                                <p>Phone: ${p.phone_number}</p>
                                <p>Amount: ₦${p.plan_price} + ₦${p.service_charge} = ₦${p.plan_price + p.service_charge}</p>
                            </div>
                            <div>
                                <button class="success-btn" onclick="approvePurchase(${p.id})">Approve</button>
                                <button class="decline-btn" onclick="declinePurchase(${p.id})">Decline</button>
                            </div>
                        </div>
                    `).join("");
                }
            }
        }

        async function loadPendingReferrals() {
            const result = await callAPI('/admin/pending-referrals');
            if (result && Array.isArray(result)) {
                const container = document.getElementById("referralsList");
                const pending = result.filter(r => r.status === "pending");
                document.getElementById("referralTabCount").textContent = pending.length;
                
                if (pending.length === 0) {
                    container.innerHTML = '<div class="empty-orders">No pending referrals</div>';
                } else {
                    container.innerHTML = pending.map(r => `
                        <div class="pending-item">
                            <div>
                                <p><strong>${r.user_name}</strong> (${r.user_email})</p>
                                <p>Network: ${r.network}</p>
                                <p>Phone: ${r.phone}</p>
                                <p>Reward: 500MB (₦${r.amount})</p>
                            </div>
                            <div>
                                <button class="success-btn" onclick="approveReferral(${r.id})">Approve</button>
                                <button class="decline-btn" onclick="declineReferral(${r.id})">Decline</button>
                            </div>
                        </div>
                    `).join("");
                }
            }
        }

        async function approveFunding(id) {
            const result = await callAPI(`/admin/approve-funding/${id}`, 'POST');
            if (result && result.success) {
                showToast("Funding approved!", "success");
                await loadAdminData();
                const userData = await callAPI(`/user/${encodeURIComponent(currentUser.email)}`);
                if (userData) {
                    currentUser.wallet_balance = userData.wallet_balance;
                    document.getElementById("walletBalance").innerHTML = `₦${currentUser.wallet_balance}`;
                }
            }
        }

        async function declineFunding(id) {
            const result = await callAPI(`/admin/decline-funding/${id}`, 'POST');
            if (result && result.success) {
                showToast("Funding declined", "error");
                await loadAdminData();
            }
        }

        async function approvePurchase(id) {
            const result = await callAPI(`/admin/approve-purchase/${id}`, 'POST');
            if (result && result.success) {
                showToast("Purchase approved! Data sent.", "success");
                await loadAdminData();
            }
        }

        async function declinePurchase(id) {
            const result = await callAPI(`/admin/decline-purchase/${id}`, 'POST');
            if (result && result.success) {
                showToast("Purchase declined. Refunded.", "error");
                await loadAdminData();
                const userData = await callAPI(`/user/${encodeURIComponent(currentUser.email)}`);
                if (userData) {
                    currentUser.wallet_balance = userData.wallet_balance;
                    document.getElementById("walletBalance").innerHTML = `₦${currentUser.wallet_balance}`;
                }
            }
        }

        async function approveReferral(id) {
            const result = await callAPI(`/admin/approve-referral/${id}`, 'POST');
            if (result && result.success) {
                showToast("Referral reward credited!", "success");
                await loadAdminData();
            }
        }

        async function declineReferral(id) {
            const result = await callAPI(`/admin/decline-referral/${id}`, 'POST');
            if (result && result.success) {
                showToast("Referral reward declined", "error");
                await loadAdminData();
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            // Fund wallet button
            document.getElementById("fundMainBtn").onclick = () => {
                document.getElementById("amountSection").style.display = "block";
            };
            
            // Amount buttons
            document.querySelectorAll(".amount-btn").forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll(".amount-btn").forEach(b => b.classList.remove("selected"));
                    btn.classList.add("selected");
                    selectedAmount = parseInt(btn.dataset.amount);
                    showToast(`Selected ₦${selectedAmount} (₦${SERVICE_CHARGE} service charge applies)`, "info");
                };
            });
            
            // Custom amount
            document.getElementById("customAmount").onchange = () => {
                const amount = parseInt(document.getElementById("customAmount").value);
                if (amount >= 400) {
                    document.querySelectorAll(".amount-btn").forEach(b => b.classList.remove("selected"));
                    selectedAmount = amount;
                    showToast(`Custom amount ₦${selectedAmount} selected`, "success");
                }
            };
            
            // Payment methods
            document.querySelectorAll(".payment-method").forEach(method => {
                method.onclick = () => {
                    document.querySelectorAll(".payment-method").forEach(m => m.style.border = "none");
                    method.style.border = "2px solid #f59e0b";
                    selectedFundingMethod = method.dataset.method;
                };
            });
            
            // Admin tabs
            document.querySelectorAll(".admin-tab").forEach(tab => {
                tab.onclick = () => {
                    document.querySelectorAll(".admin-tab").forEach(t => t.classList.remove("active"));
                    tab.classList.add("active");
                    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
                    document.getElementById(`${tab.dataset.tab}Tab`).classList.add("active");
                };
            });
        }

        // Initialize
        document.addEventListener("DOMContentLoaded", () => {
            showLogin();
            // Check for existing session
            const savedEmail = sessionStorage.getItem('userEmail');
            if (savedEmail) {
                loadDashboard();
            }
        });
    </script>
</body>
</html>
